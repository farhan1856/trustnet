<!DOCTYPE html>
<html>
<head>
  <title>TrustNet Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    button {
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🔥 TrustNet</h1>

<div class="card">
  <h3>🔐 Login</h3>
  <input id="loginPhone" placeholder="Phone">
  <button onclick="login()">Login</button>
</div>

<div class="card">
  <h3>🔍 Search User</h3>
  <input id="phone" placeholder="Enter phone">
  <button onclick="search()">Search</button>
</div>

<div class="card">
  <h3>💬 Add Review</h3>
  <input id="reviewPhone" placeholder="Phone">
  <input id="comment" placeholder="Comment">
  <input id="rating" placeholder="Rating (1-5)">
  <button onclick="addReview()">Submit</button>
</div>

<div class="card">
  <h3>📊 Result</h3>
  <pre id="result"></pre>
</div>

<script>
const API = "https://trustnet-api-farhan.onrender.com";

async function login() {
  let phone = document.getElementById("loginPhone").value;

  let res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({phone})
  });

  let data = await res.json();
  alert(data.message);
}

async function search() {
  let phone = document.getElementById("phone").value;

  let user = await fetch(API + "/user/" + phone).then(r => r.json());
  let reviews = await fetch(API + "/reviews/" + phone).then(r => r.json());

  let output =
    "Name: " + user.name + "\n" +
    "Phone: " + user.phone + "\n" +
    "Trust Score: ⭐ " + user.trust_score + "\n\nReviews:\n";

  reviews.forEach(r => {
    output += "- " + r.comment + " (⭐" + r.rating + ")\n";
  });

  document.getElementById("result").innerText = output;
}

async function addReview() {
  let phone = document.getElementById("reviewPhone").value;
  let comment = document.getElementById("comment").value;
  let rating = document.getElementById("rating").value;

  await fetch(API + "/review", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({phone, comment, rating: Number(rating)})
  });

  alert("Review added");
}
</script>

</body>
</html>
