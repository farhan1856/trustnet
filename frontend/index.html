<!DOCTYPE html>
<html>
<head>
  <title>TrustNet</title>
</head>
<body>

<h1>🔥 TrustNet</h1>

<input id="phone" placeholder="Enter phone">
<button onclick="search()">Search</button>

<pre id="result"></pre>

<script>
async function search() {
  let phone = document.getElementById("phone").value;

  let res = await fetch(
    "https://trustnet-api-farhan.onrender.com/user/" + phone
  );

  let data = await res.json();

  document.getElementById("result").innerText =
  "Name: " + data.name + "\n" +
  "Phone: " + data.phone + "\n" +
  "Trust Score: ⭐ " + data.trust_score;
}
</script>

</body>
</html>
